[pytest]
addopts = --color=yes --cov=src --cov-fail-under=80 --cov-report=html --cov-report=term -ra
filterwarnings =
log_cli = 1
log_cli_level = INFO
log_cli_format = %(asctime)s - [%(levelname)s] - %(message)s (%(filename)s:%(lineno)d)
log_cli_date_format = %Y-%m-%d %H:%M:%S
norecursedirs = doc build *.egg-info dist venv/*
